<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 114018081</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 40px 20px; display: flex; justify-content: center; }
        .resume-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .profile-pic { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid #3498db; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 10px 0 5px 0; font-size: 24px; }
        .student-id { color: #3498db; font-size: 18px; font-weight: bold; margin-bottom: 30px; }
        .info-section { text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .info-item { margin-bottom: 15px; color: #555; line-height: 1.6; }
        .label { font-weight: bold; color: #333; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>
<div class="resume-card">
    <img src="pro.jpg.JPG" alt="個人照" class="profile-pic">
    <h1>個人履歷表</h1>
    <div class="student-id">學號：114018081</div>
    <div class="info-section">
        <div class="info-item">
            <span class="label">關於我</span>
            我是亞洲大學的學生，這是我的資訊科技作業。我學會了如何使用 VS Code、Git 指令以及 GitHub Pages 來架設個人網站。
        </div>
    </div>
</div>
<audio id="bgm" autoplay loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<script>
    const audio = document.getElementById("bgm");
    audio.play().catch(() => {
        audio.muted = true;
        audio.play();
        setTimeout(() => { audio.muted = false; }, 100);
    });
</script>
</body>
</html>
