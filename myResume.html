<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 114018081</title>
    <style>
        /* 背景改為更深一點的質感藍灰色 */
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #34495e; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 履歷卡片：保持潔白，與深色背景形成強烈對比 */
        .resume-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f0f2f5;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a1a1a;
            margin: 10px 0 5px 0;
            font-size: 26px;
            font-weight: 600;
        }

        .student-id {
            color: #5f6368;
            font-size: 15px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .info-item {
            margin-bottom: 20px;
            color: #3c4043;
            line-height: 1.7;
        }

        .label {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
            color: #2980b9; 
        }

        .email-link {
            color: #2980b9;
            text-decoration: none;
        }

        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body onclick="startMusic()"> <div class="resume-card">
    <img src="pro.jpg.JPG" alt="個人照" class="profile-pic">

    <h1>個人履歷表</h1>
    <div class="student-id">學號：114018081</div>

    <div class="info-section">
        <div class="info-item">
            <span class="label">學歷背景</span>
            亞洲大學 聽力暨語言治療學系 (一年級)

            十八歲 ｜ 女nige42786@gmail.com
        </div>
        
        <div class="info-item">
            <span class="label">聯絡方式</span>
            nige42786@gmail.com
        </div>
        
        <div class="info-item">

            目前正在學習資訊科技與應用。透過這堂課，我掌握了基礎的網頁開發技巧，並能實作個人網頁的部署與維護。

    <button class="btn">感謝您的參訪！</button>

<audio id="bgm" loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("bgm");

    // 1. 嘗試自動播放（靜音模式解除法）
    window.addEventListener('load', () => {
        audio.muted = true;
        audio.play().then(() => {
            // 如果自動播放成功，0.5秒後嘗試解除靜音
            setTimeout(() => { audio.muted = false; }, 500);
        }).catch(err => console.log("等待使用者點擊以播放音樂"));
    });

    // 2. 強化播放：只要使用者點擊網頁任何地方，立刻播放音樂並解除靜音
    function startMusic() {
        audio.muted = false;
        audio.play();
    }
</script>

</body>
</html>
