<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 114018081</title>
    <style>
        /* 頁面整體設計 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* 履歷卡片外框 */
        .resume-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 照片樣式：預設為圓形 */
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
            margin-bottom: 20px;
            background-color: #eee; /* 照片還沒出來前的底色 */
        }

        h1 {
            color: #2c3e50;
            margin: 10px 0 5px 0;
            font-size: 24px;
        }

        .student-id {
            color: #3498db;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 15px;
            color: #555;
            line-height: 1.6;
        }

        .label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 3px;
        }

        /* 按鈕互動效果 */
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="resume-card">
    <img src="pro.jpg.JPG" alt="個人照" class="profile-pic">

    <h1>個人履歷表</h1>
    <div class="student-id">學號：114018081</div>

    <div class="info-section">
        <div class="info-item">
            <span class="label">關於我</span>
            我是亞洲大學的學生，目前正在學習資訊科技應用，這是我練習 HTML5 與 CSS3 的成果展示。
        </div>
        <div class="info-item">
            <span class="label">專業技能</span>
            網頁前端開發、Git 版本控制、GitHub Pages 部署。
        </div>
    </div>

    <button class="btn" onclick="alert('哈囉！這是我的第一份網頁履歷！')">跟大夥打個招呼</button>
</div>

<audio id="bgm" autoplay loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("bgm");

    // 嘗試直接播放
    audio.play().catch(() => {
        // 若被擋，快速解除靜音再播放
        audio.muted = true;
        audio.play();

        setTimeout(() => {
            audio.muted = false;
        }, 100);
    });
</script>

</body>
</html>
