<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 114018081</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #2c3e50;
            background-image: radial-gradient(circle at 50% 50%, #34495e 0%, #2c3e50 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .resume-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        .resume-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .profile-pic:hover { transform: scale(1.05); }

        h1 { color: #2c3e50; margin: 10px 0 5px 0; font-size: 26px; }
        .student-id { color: #7f8c8d; font-size: 14px; margin-bottom: 15px; letter-spacing: 2px; }
        .motto { font-style: italic; color: #95a5a6; margin-bottom: 25px; font-size: 14px; }

        .info-section { text-align: left; border-top: 1px solid #f1f1f1; padding-top: 25px; }
        .info-item { margin-bottom: 22px; display: flex; align-items: flex-start; }
        .info-item i { color: #3498db; margin-top: 5px; margin-right: 15px; width: 20px; text-align: center; }
        .label { font-weight: 700; color: #34495e; display: block; margin-bottom: 3px; font-size: 15px; }
        .text { color: #636e72; font-size: 14.5px; line-height: 1.6; margin: 0; }
        .email-link { color: #3498db; text-decoration: none; }

        .btn {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { background-color: #2c3e50; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body onclick="startMusic()">

<div class="resume-card">
    <img src="pro.jpg" alt="個人照" class="profile-pic">

    <h1>個人履歷表</h1>
    <div class="student-id">ID: 114018081</div>
    
    <p class="motto">「用聽與說，拉近心的距離。」</p>

    <div class="info-section">
        <div class="info-item">
            <i class="fas fa-university"></i>
            <div class="item-content">
                <span class="label">學歷背景</span>
                <p class="text">亞洲大學 聽力暨語言治療學系 (一年級)</p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-id-card"></i>
            <div class="item-content">
                <span class="label">基本資料</span>
                <p class="text">女性 ｜ 十八歲</p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-envelope"></i>
            <div class="item-content">
                <span class="label">聯絡資訊</span>
                <p class="text"><a href="mailto:nige42786@gmail.com" class="email-link">nige42786@gmail.com</a></p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-user"></i>
            <div class="item-content">
                <span class="label">個人簡介</span>
                <p class="text">目前就讀於亞大聽語系。透過資訊科技課程，我掌握了網頁開發與 GitHub 部署技巧，熱衷於結合專業與科技解決問題。</p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-star"></i>
            <div class="item-content">
                <span class="label">專業專長</span>
                <p class="text">電腦文書處理 (MS Office)、基礎網頁製作、Git 版本控制。</p>
            </div>
        </div>
    </div>

    <button class="btn">
        <i class="fas fa-paper-plane"></i> 歡迎聯繫我
    </button>
</div>

<audio id="bgm" loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("bgm");
    window.addEventListener('load', () => {
        audio.muted = true;
        audio.play().then(() => {
            setTimeout(() => { audio.muted = false; }, 500);
        }).catch(err => console.log("等待點擊播放"));
    });
    function startMusic() {
        audio.muted = false;
        audio.play();
    }
</script>

</body>
</html>
