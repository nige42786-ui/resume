<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 114018081</title>
    <style>
        /* 1. 背景改為簡約的淺暖灰色，看起來更專業舒適 */
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. 履歷卡片優化：細緻的陰影與白淨的背景 */
        .resume-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* 照片樣式 */
        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f0f2f5;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a1a1a;
            margin: 10px 0 5px 0;
            font-size: 26px;
            font-weight: 600;
        }

        .student-id {
            color: #5f6368;
            font-size: 15px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .info-item {
            margin-bottom: 20px;
            color: #3c4043;
            line-height: 1.7;
        }

        .label {
            font-weight: 600;
            color: #202124;
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
            color: #1a73e8; /* 標籤使用專業藍色小點綴 */
        }

        .email-link {
            color: #1a73e8;
            text-decoration: none;
        }

        /* 3. 按鈕改為深色系，增加沉穩感 */
        .btn {
            background-color: #202124;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            background-color: #3c4043;
        }
    </style>
</head>
<body>

<div class="resume-card">
    <img src="pro.jpg" alt="個人照" class="profile-pic">

    <h1>個人履歷表</h1>

    <div class="info-section">
        <div class="info-item">
            <span class="label">學歷背景</span>
            亞洲大學 聽力暨語言治療學系 (一年級)
        </div>

        <div class="info-item">
            <span class="label">基本資料</span>
            十八歲 ｜ nige42786@gmail.com
        </div>

        <div class="info-item">
            <span class="label">個人簡介</span>
            目前正在學習資訊科技與應用。透過這堂課，我掌握了基礎的網頁開發技巧，並能實作個人網頁的部署與維護。
        </div>

        <div class="info-item">
            <span class="label">專長</span>
